services:
  zookeeper:
    image: zookeeper:3.8
    restart: always
    ports:
      - "2181:2181"
  database:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_PASSWORD: secret
    volumes:
      - db_data:/var/lib/postgresql/data
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: database
    volumes:
      - ./app:/app
    depends_on:
      - database
      - redis
  redis:
    image: redis:7
    ports:
      - "6379:6379"
volumes:
  db_data:
  cache_data:
networks:
  backend:
  frontend:
